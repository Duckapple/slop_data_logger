name = "name-misspell"
main = "src/worker/index.ts"
compatibility_date = "2025-12-01"
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Run `wrangler d1 create name-misspell` and paste the returned database_id here.
[[d1_databases]]
binding = "DB"
database_name = "name-misspell"
database_id = "41bb355c-0a59-4746-a37d-ca5301d9ffc2"
migrations_dir = "migrations"

# Run `wrangler r2 bucket create name-misspell-uploads` once.
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "name-misspell-uploads"

[vars]
SEED_DEMO_DATA = "false"
